<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Focus Extension</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Stats section with settings button aligned top-right -->
    <section id="statsSection">
        <div class="top-bar">
            <h3>Stats</h3>
            <button id="settingsBtn" class="settings-btn">⚙</button>
        </div>
        <div id="stats"></div>
    </section>

    <!-- Delay timer -->
    <section id="timerSection">
        <h3>Delay Timer</h3>
        <div class="slider-container">
            <input type="range" id="delaySlider" min="1" max="10" value="3">
            <span id="delayValue">3s</span>
        </div>
    </section>

    <!-- Focus control / blocked sites -->
    <section id="focusSection">
        <h2>Focus Control</h2>
        <form id="siteForm" class="input-row">
            <input type="text" id="siteInput" placeholder="e.g. youtube.com">
            <button type="submit" id="addBtn">Add</button>
        </form>
        <ul id="siteList"></ul>
    </section>

    <script src="popup.js"></script>
</body>
</html>
